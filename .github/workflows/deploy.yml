Name: Deploy to GitHub Pages

On:
  Push:
    Branches: [“main”]

Permissions:
  Contents: read
  Pages: write
  Id-token: write

Jobs:
  Build:
    Runs-on: ubuntu-latest
    Steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        With:
          Node-version: 20
-	Run: |
          Mkdir -p dist
          Cp index.html dist/
-	Uses: actions/upload-pages-artifact@v3
        With:
          Path: ‘./dist’

  Deploy:
    Needs: build
    Runs-on: ubuntu-latest
    Environment:
      Name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
-	Id: deployment
        Uses: actions/deploy-pages@v4

